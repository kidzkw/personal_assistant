services:
  echo:
    build:
      context: .
    image: echo-personal-assistant:local
    container_name: echo-personal-assistant
    ports:
      - "8080:8080"
    environment:
      ECHO_HOST: 0.0.0.0
      ECHO_PORT: 8080
      ECHO_TIMEZONE: America/New_York
    volumes:
      - ./runtime/inbox:/app/runtime/inbox
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
